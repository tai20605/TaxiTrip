boston_rideshare:
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID', 'boston-rideshare-analytics') }}"
      dataset: "{{ env_var('BQ_DATASET', 'rideshare_dw') }}"
      threads: 4
      keyfile: "{{ env_var('DBT_KEYFILE', '/usr/app/credentials/service-account.json') }}"
      timeout_seconds: 300
      priority: interactive
      retries: 1
  target: dev
